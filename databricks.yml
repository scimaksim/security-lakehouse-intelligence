bundle:
  name: security-lakehouse-intelligence

variables:
  catalog:
    description: Unity Catalog catalog for security lakehouse tables
    default: sec_lakehouse
  warehouse_id:
    description: SQL Warehouse ID for the dashboard app
  genie_space_id:
    description: Genie Space ID (created by the setup job, then set here)
    default: ""
  serving_endpoint:
    description: Foundation Model serving endpoint for AI features
    default: databricks-claude-sonnet-4-6

workspace:
  root_path: /Workspace/Users/${workspace.current_user.userName}/security-lakehouse-intelligence

sync:
  include:
    - app/frontend/dist/**

resources:
  jobs:
    setup_security_lakehouse:
      name: "[Security Lakehouse] Setup Pipeline"
      tasks:
        - task_key: generate_demo_data
          notebook_task:
            notebook_path: notebooks/demo_data_generator.py
            base_parameters:
              catalog: ${var.catalog}
          environment_key: default
        - task_key: generate_dns_vuln_data
          depends_on:
            - task_key: generate_demo_data
          notebook_task:
            notebook_path: notebooks/demo_data_fix.py
            base_parameters:
              catalog: ${var.catalog}
          environment_key: default
        - task_key: create_genie_space
          depends_on:
            - task_key: generate_dns_vuln_data
          notebook_task:
            notebook_path: notebooks/genie-space-generator/genie_space_setup.py
          environment_key: default
      environments:
        - environment_key: default
          spec:
            client: "2"

  apps:
    security_dashboard:
      name: security-lakehouse-dashboard
      description: "Security Lakehouse Intelligence — OCSF-normalized threat dashboard with Genie AI"
      source_code_path: app
      config:
        command:
          - python
          - "-m"
          - uvicorn
          - "app:app"
          - "--host"
          - "0.0.0.0"
          - "--port"
          - "8000"
        env:
          - name: WAREHOUSE_ID
            value: ${var.warehouse_id}
          - name: CATALOG
            value: ${var.catalog}
          - name: GENIE_SPACE_ID
            value: ${var.genie_space_id}

targets:
  dev:
    default: true
    mode: development
